<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Kanji Samurai</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="gameCanvas">

    <!-- ローディング -->
    <div id="loadingArea">Loading...</div>

    <!-- UI -->
    <div id="uiWrapper"></div>

    <!-- バトル画面 -->
    <div id="battleScreen">

      <!-- 上部：ステータス -->
      <div id="statusArea">
        <div id="kiwami-container">
          <img id="kiwami-bg" alt="">
          <img id="kiwami-image" alt="">
        </div>
      </div>

      <!-- 中央：キャラ -->
      <div id="actionArea">
        <img id="player" src="samurai-Sheet.png" alt="Samurai">
      </div>

      <!-- 下部：クイズ -->
      <div id="quizArea"></div>

    </div>
  </div>

  <!-- 🔻 JSは最後にまとめる -->
  <script type="module" src="assets.js"></script>
  <script type="module" src="quizManager.js"></script>
  <script type="module" src="battleManager.js"></script>
  <script type="module" src="character.js"></script>
  <script type="module" src="screenManager.js"></script>
  <script type="module" src="gameManager.js"></script>

  <script>
    window.addEventListener('load', () => {
      if (typeof loadAssets === 'function') {
        loadAssets();
        console.log("Assets loaded.");
      }
    });
  </script>

</body>
</html>
