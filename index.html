<!DOCTYPE html>
<html>
  <head>
      <meta charset="UTF-8"> <!-- 文字化けを防ぐための設定 -->
      <link rel="stylesheet" href="css/style.css"> <!--style.cssファイルを読み込む -->
  </head>
    
    <body>
      <div id="gameCanvas"> <!-- これが cqw の基準になります -->
        <div id="loadingArea">loading</div>  <!-- JavaScriptが文字を書き換える場所 -->
        <script src="assets.js"></script>
        <script src="quiz.js"></script>   
        <script src="character.js"></script>  
        <div id="uiWrapper"></div>

        <div id="battleScreen">
      <!-- 1. 上部：ステータスエリア (20%) -->
        <div id="statusArea">
          <div id="kiwami-container">
            <img id="kiwami-bg">
            <img id="kiwami-image">
          </div>
        </div>

      <!-- 2. 中央：キャラ演出エリア (50%) -->
        <div id="actionArea">
        <!-- ここに侍や敵の画像が表示されるイメージ -->
        </div>

      <!-- 3. 下部：クイズエリア (30%) -->
        <div id="quizArea">
           <!-- JavaScriptでここに問題やボタンが作られる -->
        </div>
    </div>
    
      <script src="screenManager.js"></script>

      <script>
      // HTMLがすべて読み込まれたら、アセットを初期化する
      window.addEventListener('load', () => {
        if (typeof loadAssets === 'function') {
          loadAssets();
          console.log("Assets loaded.");
        }
      });
    </script>
    </body>
</html>
